<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bandeiras</title>

    <style>
    
        body{
            display: flex;
            justify-content: space-evenly;
            margin: 50px;
            
        }
        .holanda {
           border: solid 2px black;
        }

        .holanda div {
            width: 350px;
            height: 50px;
        }

        .faixaH1 {
            background-color: rgb(130, 20, 20);

        }
        .faixaH2 {
            background-color: rgb(255, 255, 255);
        }

        .faixaH3 {
            background-color: rgb(14, 2, 122);
        }

        .alemanha {
           border: solid 2px black;
        }

        .alemanha div {
             width: 350px;
            height: 50px;
        }

        .faixaA1 {
            background-color: rgb(0, 0, 0);
        }
        .faixaA2 {
            background-color: rgb(130, 20, 20);
        }

        .faixaA3 {
            background-color: rgb(255, 213, 0);
        }

        .italia {
           border: solid 2px black;
           display: flex;
           justify-content: space-evenly;
        }

        .italia div { 
            
            width: 116px;
            height: 150px;
        }

        .faixaI1 {
            background-color: rgb(6, 64, 0);
        }
        .faixaI2 {
            background-color: rgb(255, 255, 255);
        }
        .faixaI3 {
            background-color: rgb(130, 20, 20);
        }


    </style>
</head>
<body>
    
        <div class="holanda">
                <div class="faixaH1"></div>
                <div class="faixaH2"></div>
                <div class="faixaH3"></div>
        </div>


        <div class="alemanha">
            <div class="faixaA1"></div>
            <div class="faixaA2"></div>
            <div class="faixaA3"></div>
        </div>


        <div class="italia">
             <div class="faixaI1"></div>
            <div class="faixaI2"></div>
            <div class="faixaI3"></div>

        </div>
    
</body>
</html>
