<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Semáforo</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            
        }
        .semaforo {
            width: 300px;
            height: 550px;
            margin-left: auto;
            margin-right: auto;
            margin-top: 20px;
            background-color: rgb(75, 75, 75);
            padding: 15px;
            box-sizing: border-box;
            border-radius: 30px;
        }

        .vermelho {
            margin: 10px auto 10px auto;
            width: 75%;
            height: 30%;
            background-color: red;
            border-radius: 70%;
            box-sizing: border-box;
        }

        .amarelo {
            margin: 10px auto 10px auto;
            width: 75%;
            height: 30%;
            background-color: rgb(255, 221, 0);
            border-radius: 70%;
            box-sizing: border-box;
        }

         .verde {
            margin:10px auto 10px auto;
            width: 75%;
            height: 30%;
            background-color: rgb(30, 129, 23);
            border-radius: 70%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="semaforo">
        <div class="vermelho"></div>
        <div class="amarelo"> </div>
        <div class="verde"></div>
    </div>
    
</body>
</html>
