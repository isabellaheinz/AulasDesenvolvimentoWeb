<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 3</title>

    <style>

        * {

            margin: 0;
            padding: 0;
            
        }
        .one {
            width: 50vw;
            height: 50vh;
           border: 2px solid black;
           border-collapse: collapse;
        }

        .two {
            width: 100%;
            height: calc(100% - 50px);
            border: 2px solid black;
            border-collapse: collapse;
        }

        footer {
            width: 100%;
            height: 50px;
           border: 2px solid black;
           border-collapse: collapse;
        }

    </style>

</head>


<body>

    <div class="one">
        <div class="two"></div>

        <footer>
            rodape
        </footer>
    </div>
    
    
</body>
