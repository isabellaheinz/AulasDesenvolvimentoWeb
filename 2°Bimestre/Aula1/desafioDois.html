<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 2</title>

    <style>
        div {
            height: 100px;
            border: 2px solid rgb(109, 109, 109);
            margin: 10px;
        }

        .one {
            width: 100px;
            background-color: lightblue;

            transition: all ease 0.5s;
        }

        .one:hover {
            width: 150px;
            opacity: 70%;
            
        }

        .two {
            width: 200px;
            background-color: lightgoldenrodyellow;
            transition: all ease 0.5s
        }
        
         .two:hover {
            width: 250px;
            opacity: 70%;
        }

        .three {
            width: 300px;
            background-color: lightpink;
            transition: all ease 0.5s
        }

         .three:hover {
            width: 350px;
            opacity: 70%;
        }
    </style>
</head>
<body>
    <div class="one"></div>
    <div class="two"></div>
    <div class="three"></div>
</body>
</html>
